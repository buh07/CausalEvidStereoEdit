run_tag_prefix: arr_rev3
freeze_name: arr_rev3_freeze

core_models:
  - key: gemma2b
    label: Gemma-2-2B
    model: google/gemma-2-2b
    gpu: 0
    heldout_pairs: 120
    torch_dtype: bfloat16
  - key: gemma2bit
    label: Gemma-2-2B-IT
    model: google/gemma-2-2b-it
    gpu: 1
    heldout_pairs: 120
    torch_dtype: bfloat16
  - key: llama3b
    label: Llama-3.2-3B
    model: meta-llama/Llama-3.2-3B
    gpu: 2
    heldout_pairs: 120
    torch_dtype: bfloat16

extension_models:
  - key: qwen3b
    label: Qwen-3B
    model: Qwen/Qwen2.5-3B
    gpu: 4
    heldout_pairs: 80
    torch_dtype: bfloat16
  - key: qwen3bi
    label: Qwen-3B-Instruct
    model: Qwen/Qwen2.5-3B-Instruct
    gpu: 5
    heldout_pairs: 80
    torch_dtype: bfloat16
  - key: mistral7b
    label: Mistral-7B
    model: /jumbo/lisp/f004ndc/models/mistral-7b-v0.1
    gpu: 6
    heldout_pairs: 44
    torch_dtype: float16
  - key: olmo7b
    label: OLMo-2-7B
    model: /jumbo/lisp/f004ndc/models/olmo-2-7b
    gpu: 7
    heldout_pairs: 44
    torch_dtype: float16

global:
  device: cuda:0
  max_length: 256
  top_k: 20
  bootstrap_n: 1000
  eval_sources: stereoset_intrasentence,crows_pairs

frozen_seeds:
  canonical: 11
  seed_aggregate:
    - 11
    - 29
    - 47
  crossfit:
    - 101
    - 131
    - 151

exp01:
  mixed:
    pairs_limit: 600
    per_source_limit: 2500
    direction_position: trait
  stereoset_only:
    pairs_limit: 450
    per_source_limit: 2500
  crows_only:
    pairs_limit: 500
    per_source_limit: 2500
  extension:
    pairs_limit_3b: 450
    pairs_limit_7b: 260

exp02:
  strict:
    split_scope: train
    pairs_limit: 300
    top_components_source: mixed
  transfer_source_specific:
    split_scope: train
    pairs_limit_stereoset: 300
    pairs_limit_crows: 350
    top_components_source: mixed

exp03:
  strict:
    split_scope: train
    pairs_limit: 220
    validation_pairs_per_component: 8

exp09:
  strict:
    ranking_source: union
    promoters_only: true
    truncate_shuffle: true

exp15:
  promoters_only: false

exp21:
  sesoi: 0.10
  alpha: 0.05
  target_power: 0.80

exp26:
  train_pairs: 360
  prompt_variant: therefore_next_word
  sensitivity_variants:
    - so_next_word
    - plain_suffix

exp27:
  max_span_len: 3

exp28:
  eval_scope: all
  max_span_len: 3
  span_strata: all,2,3
  sesoi: 0.10
  alpha: 0.05
  target_power: 0.80
  balanced:
    mode: quota
    source_quotas: stereoset_intrasentence:10,crows_pairs:10
    balance_seed: 29

exp29:
  mitigation_prefix: "Please continue the sentence in a respectful, non-stereotypical way: "

exp07:
  ranks: 1,2,4,8,16,32
  basis_mode: both
